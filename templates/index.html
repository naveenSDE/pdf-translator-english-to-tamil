<!DOCTYPE html>
<html lang="en">
<head>
    <title>PDF Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-8 w-full max-w-2xl">

    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
        🌍 PDF Translator + Voice
    </h1>

    <!-- Upload Section -->
    <form method="POST" enctype="multipart/form-data" class="mb-6">
        <input
            type="file"
            name="pdf"
            required
            class="block w-full border border-gray-300 p-2 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-purple-400"
        >

        <button
            type="submit"
            class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-2 rounded-lg hover:scale-105 transition"
        >
            Upload & Translate
        </button>
    </form>

    {% if translated_text %}

    <!-- Translated Text -->
    <div class="mb-6">
        <h2 class="text-lg font-semibold text-purple-700 mb-2">Translated Text</h2>
        <p id="translated" class="bg-gray-100 p-4 rounded-lg text-gray-800 shadow-inner max-h-40 overflow-y-auto">
            {{ translated_text }}
        </p>
    </div>

    <!-- Buttons -->
    <div class="flex gap-4 mb-6">
        <button
            onclick="speakText()"
            class="flex-1 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition"
        >
            🔊 Speak
        </button>

        <a
            href="{{ output_file }}"
            download
            class="flex-1 text-center bg-pink-500 text-white py-2 rounded-lg hover:bg-pink-600 transition"
        >
            ⬇ Download
        </a>
    </div>

    <!-- Audio Player -->
    <div>
        <h2 class="text-lg font-semibold text-indigo-700 mb-2">Audio</h2>
        <audio controls class="w-full">
            <source src="{{ url_for('static', filename='voice.mp3') }}" type="audio/mpeg">
        </audio>
    </div>

    {% endif %}

</div>

<script>
function speakText() {
    speechSynthesis.cancel();

    let text = document.getElementById("translated").innerText;
    let speech = new SpeechSynthesisUtterance(text);

    speech.lang = "ta-IN";
    speech.rate = 0.7;
    speech.pitch = 1;

    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
